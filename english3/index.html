    };
    const labels = { word: '单词', abbreviation: '缩写', chunk: '语块', sentence: '句子', template: '模板', note: '说明' };
    const svg = {
      star: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m12 3 2.8 5.7 6.2.9-4.5 4.4 1.1 6.1-5.6-3-5.6 3 1.1-6.1L3 9.6l6.2-.9L12 3z"/></svg>',
      speaker: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 5 6 9H3v6h3l5 4V5z"/><path d="M15.5 8.5a5 5 0 0 1 0 7"/><path d="M18.5 5.5a9 9 0 0 1 0 13"/></svg>',
      copy: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>'
    };
    function escapeHtml(value) {
      return String(value || '').replace(/[&<>"]/g, (ch) => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[ch]));
    }
    function normalize(value) { return String(value || '').toLowerCase(); }
    function saveSets() {
      localStorage.setItem('workplaceEnglishFavorites', JSON.stringify([...state.favorites]));
      localStorage.setItem('workplaceEnglishSeen', JSON.stringify([...state.seen]));
    }
    function toast(message) {
      els.toast.textContent = message;
      els.toast.classList.add('show');
      clearTimeout(toast.timer);
      toast.timer = setTimeout(() => els.toast.classList.remove('show'), 1500);
    }
    function typeMatches(item) {
      if (state.type === 'all' || state.type === 'json') return true;
      if (state.type === 'word') return ['word', 'abbreviation', 'note'].includes(item.type);
      if (state.type === 'chunk') return ['chunk', 'sentence'].includes(item.type);
      return item.type === state.type;
    }
    function getFiltered() {
      const q = normalize(state.query.trim());
      const result = data.items.filter((item) => {
        if (!typeMatches(item)) return false;
        if (state.categories.size && !state.categories.has(item.category)) return false;
        if (!q) return true;
        return normalize([item.en, item.cn, item.example, item.note, item.category, item.sourceName].join(' ')).includes(q);
      });
      result.sort((a, b) => {
        if (state.sort === 'az') return a.en.localeCompare(b.en);
        if (state.sort === 'category') return (a.category + a.en).localeCompare(b.category + b.en);
        return Number(b.priority) - Number(a.priority) || a.category.localeCompare(b.category) || a.en.localeCompare(b.en);
      });
      return result;
    }
    function renderStats() {
      const words = data.items.filter((i) => ['word', 'abbreviation', 'note'].includes(i.type)).length;
      const chunks = data.items.filter((i) => ['chunk', 'sentence', 'template'].includes(i.type)).length;
      els.total.textContent = data.items.length;
      els.words.textContent = words;
      els.chunks.textContent = chunks;
      els.favs.textContent = state.favorites.size;
      els.progressText.textContent = `${state.seen.size} / ${data.items.length}`;
      els.progressBar.style.width = data.items.length ? `${Math.min(100, Math.round(state.seen.size / data.items.length * 100))}%` : '0%';
    }
    function renderCategories() {
      els.categories.innerHTML = '';
      const counts = new Map();
      data.items.forEach((item) => counts.set(item.category, (counts.get(item.category) || 0) + 1));
      [...counts.entries()].sort((a, b) => b[1] - a[1]).forEach(([category, count]) => {
        const button = document.createElement('button');
        button.type = 'button';
        button.className = 'chip' + (state.categories.has(category) ? ' active' : '');
        button.textContent = `${category} ${count}`;
        button.addEventListener('click', () => {
          state.categories.has(category) ? state.categories.delete(category) : state.categories.add(category);
          render();
        });
        els.categories.appendChild(button);
      });
    }
    function speak(text, id) {
      if (!('speechSynthesis' in window)) { toast('当前浏览器不支持朗读'); return; }
      window.speechSynthesis.cancel();
      const utterance = new SpeechSynthesisUtterance(text);
      utterance.lang = 'en-US';
      utterance.rate = 0.82;
      window.speechSynthesis.speak(utterance);
      if (id) {
        state.seen.add(id);
        saveSets();
        renderStats();
      }
    }
    async function copyText(text) {
      try {
        await navigator.clipboard.writeText(text);
      } catch (error) {
        const textarea = document.createElement('textarea');
        textarea.value = text;
        document.body.appendChild(textarea);
        textarea.select();
        document.execCommand('copy');
        textarea.remove();
      }
      toast('已复制');
    }
    function card(item) {
      const article = document.createElement('article');
      article.className = 'item-card';
      article.innerHTML = `
        <div class="card-top">
          <div class="badges">
            <span class="badge ${item.type}">${labels[item.type] || item.type}</span>
            <span class="badge">${escapeHtml(item.category)}</span>
            ${item.priority ? '<span class="badge priority">优先</span>' : ''}
          </div>
          <button class="icon-btn" data-action="favorite" aria-label="收藏">${svg.star}</button>
        </div>
        <p class="en">${escapeHtml(item.en)}</p>
        ${item.cn ? `<p class="cn">${escapeHtml(item.cn)}</p>` : ''}
        ${item.example ? `<p class="example">${escapeHtml(item.example)}</p>` : ''}
        ${item.note ? `<p class="muted">${escapeHtml(item.note)}</p>` : ''}
        <div class="card-actions">
          <div class="muted">${escapeHtml(item.sourceName)}</div>
          <div class="toolbar-actions">
            <button class="icon-btn" data-action="speak" aria-label="朗读">${svg.speaker}</button>
            <button class="icon-btn" data-action="copy" aria-label="复制">${svg.copy}</button>
          </div>
        </div>`;
      if (state.favorites.has(item.id)) article.querySelector('[data-action="favorite"]').classList.add('primary');
      article.querySelector('[data-action="favorite"]').addEventListener('click', () => {
        state.favorites.has(item.id) ? state.favorites.delete(item.id) : state.favorites.add(item.id);
        saveSets();
        renderStats();
        renderCards(state.filtered);
      });
      article.querySelector('[data-action="speak"]').addEventListener('click', () => speak(item.en, item.id));
      article.querySelector('[data-action="copy"]').addEventListener('click', () => copyText([item.en, item.cn, item.example].filter(Boolean).join('\n')));
      return article;
    }
    function renderCards(items) {
      els.cards.innerHTML = '';
      els.empty.classList.toggle('hidden', items.length > 0);
      const shown = items.slice(0, 240);
      const fragment = document.createDocumentFragment();
      shown.forEach((item) => fragment.appendChild(card(item)));
      els.cards.appendChild(fragment);
      els.summary.textContent = `找到 ${items.length} 条${items.length > shown.length ? `，已显示前 ${shown.length} 条` : ''}`;
    }
    function renderPractice() {
      const pool = state.filtered.length ? state.filtered : data.items;
      if (!state.practiceItem || !pool.some((item) => item.id === state.practiceItem.id)) {
        state.practiceItem = pool[Math.floor(Math.random() * pool.length)] || data.items[0];
      }
      if (!state.practiceItem) return;
      els.practiceEn.textContent = state.practiceItem.en;
      els.practiceCn.textContent = state.practiceItem.cn || state.practiceItem.example || '';
      els.practiceCn.classList.toggle('hidden', state.hidePracticeCn);
      els.togglePracticeCn.textContent = state.hidePracticeCn ? '显示中文' : '隐藏中文';
    }
    function renderJsonPanel() {
      els.jsonViewer.textContent = JSON.stringify(data, null, 2);
      const showJson = state.type === 'json';
      els.jsonPanel.classList.toggle('active', showJson);
      els.listPanel.classList.toggle('hidden', showJson);
    }
    function render() {
      state.filtered = getFiltered();
      renderStats();
      renderCategories();
      renderJsonPanel();
      if (state.type !== 'json') renderCards(state.filtered);
      renderPractice();
    }
    document.querySelectorAll('.tab').forEach((tab) => tab.addEventListener('click', () => {
      document.querySelectorAll('.tab').forEach((button) => button.classList.remove('active'));
      tab.classList.add('active');
      state.type = tab.dataset.type;
      render();
    }));
    els.search.addEventListener('input', (event) => { state.query = event.target.value; render(); });
    els.sort.addEventListener('change', (event) => { state.sort = event.target.value; render(); });
    $('clearFilters').addEventListener('click', () => { state.categories.clear(); render(); });
    $('resetView').addEventListener('click', () => {
      state.query = '';
      state.type = 'all';
      state.categories.clear();
      state.sort = 'priority';
      els.search.value = '';
      els.sort.value = 'priority';
      document.querySelectorAll('.tab').forEach((button) => button.classList.toggle('active', button.dataset.type === 'all'));
      render();
    });
    $('copyFiltered').addEventListener('click', () => copyText(JSON.stringify(state.filtered, null, 2)));
    $('copyAllJson').addEventListener('click', () => copyText(JSON.stringify(data, null, 2)));
    $('downloadJson').addEventListener('click', () => {
      const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json;charset=utf-8' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = 'workplace_english_embedded_automotive.json';
      document.body.appendChild(a);
      a.click();
      a.remove();
      URL.revokeObjectURL(url);
    });
    $('markShown').addEventListener('click', () => {
      state.filtered.forEach((item) => state.seen.add(item.id));
      saveSets();
      renderStats();
      toast('当前结果已标记');
    });
    $('nextPractice').addEventListener('click', () => {
      const pool = state.filtered.length ? state.filtered : data.items;
      state.practiceItem = pool[Math.floor(Math.random() * pool.length)] || data.items[0];
      renderPractice();
    });
    $('practiceSpeak').addEventListener('click', () => state.practiceItem && speak(state.practiceItem.en, state.practiceItem.id));
    els.togglePracticeCn.addEventListener('click', () => { state.hidePracticeCn = !state.hidePracticeCn; renderPractice(); });
    render();
  </script>
</body>
</html>

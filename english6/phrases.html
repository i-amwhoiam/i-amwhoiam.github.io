<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>英语短语练习 · English Phrases</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
  background: #f0f2f5;
  color: #1a202c;
  height: 100vh;
  overflow: hidden;
  display: flex;
  flex-direction: column;
}

/* ── HEADER ── */
.header {
  background: linear-gradient(135deg, #5a67d8 0%, #9f7aea 100%);
  color: white;
  padding: 12px 24px;
  display: flex;
  align-items: center;
  gap: 16px;
  box-shadow: 0 2px 12px rgba(90,103,216,.4);
  flex-shrink: 0;
  flex-wrap: wrap;
}
.header-title { font-size: 20px; font-weight: 700; white-space: nowrap; }
.header-subtitle { font-size: 12px; opacity: .75; }

.search-box {
  flex: 1;
  min-width: 160px;
  max-width: 320px;
  padding: 8px 16px;
  border-radius: 20px;
  border: none;
  background: rgba(255,255,255,.2);
  color: white;
  font-size: 14px;
  outline: none;
  transition: background .2s;
}
.search-box::placeholder { color: rgba(255,255,255,.65); }
.search-box:focus { background: rgba(255,255,255,.3); }

.header-btn {
  padding: 8px 18px;
  border-radius: 20px;
  border: 2px solid rgba(255,255,255,.6);
  background: transparent;
  color: white;
  font-size: 13px;
  font-weight: 600;
  cursor: pointer;
  white-space: nowrap;
  transition: all .2s;
}
.header-btn:hover { background: rgba(255,255,255,.2); border-color: white; }
.header-btn.active { background: white; color: #5a67d8; border-color: white; }

.header-stats { font-size: 12px; opacity: .8; white-space: nowrap; }

#fileInput { display: none; }

/* ── LAYOUT ── */
.layout {
  display: flex;
  flex: 1;
  overflow: hidden;
}

/* ── SIDEBAR ── */
.sidebar {
  width: 260px;
  background: white;
  border-right: 1px solid #e2e8f0;
  overflow-y: auto;
  flex-shrink: 0;
  display: flex;
  flex-direction: column;
}
.sidebar-header {
  padding: 14px 16px 8px;
  font-size: 11px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: .08em;
  color: #a0aec0;
  border-bottom: 1px solid #f0f2f5;
  flex-shrink: 0;
}
.sidebar-list { padding: 8px; flex: 1; overflow-y: auto; }

.source-nav-item {
  padding: 10px 12px;
  border-radius: 8px;
  cursor: pointer;
  font-size: 13px;
  font-weight: 500;
  color: #4a5568;
  margin-bottom: 2px;
  transition: all .15s;
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.source-nav-item:hover { background: #f3f4f6; color: #2d3748; }
.source-nav-item.active { background: #ede9fe; color: #5a67d8; font-weight: 700; }
.source-nav-count {
  font-size: 11px;
  background: #e2e8f0;
  border-radius: 10px;
  padding: 2px 7px;
  color: #718096;
  font-weight: 600;
}
.source-nav-item.active .source-nav-count { background: #c4b5fd; color: #5a67d8; }

/* ── MAIN CONTENT ── */
.main {
  flex: 1;
  overflow-y: auto;
  padding: 20px 24px;
}

/* ── WELCOME SCREEN ── */
.welcome {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  height: 100%;
  text-align: center;
  gap: 16px;
}
.welcome-icon { font-size: 64px; }
.welcome h2 { font-size: 24px; font-weight: 700; color: #2d3748; }
.welcome p { color: #718096; font-size: 15px; max-width: 360px; line-height: 1.6; }
.welcome-btn {
  padding: 14px 32px;
  border-radius: 12px;
  border: none;
  background: linear-gradient(135deg, #5a67d8, #9f7aea);
  color: white;
  font-size: 16px;
  font-weight: 700;
  cursor: pointer;
  transition: all .2s;
  box-shadow: 0 4px 16px rgba(90,103,216,.35);
}
.welcome-btn:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(90,103,216,.45); }

/* ── SOURCE SECTION ── */
.source-block { margin-bottom: 32px; }
.source-title {
  font-size: 22px;
  font-weight: 800;
  color: #2d3748;
  margin-bottom: 4px;
  padding-bottom: 8px;
  border-bottom: 3px solid #5a67d8;
  display: inline-block;
}
.source-meta { font-size: 12px; color: #a0aec0; margin-bottom: 20px; }

.section-block { margin-bottom: 24px; }
.section-title {
  font-size: 14px;
  font-weight: 700;
  color: #5a67d8;
  margin-bottom: 14px;
  padding: 6px 12px;
  background: #ede9fe;
  border-radius: 8px;
  display: inline-block;
}

/* ── PHRASE CARDS ── */
.phrase-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
  gap: 12px;
}

.phrase-card {
  background: white;
  border-radius: 12px;
  padding: 16px 18px;
  cursor: pointer;
  border: 2px solid transparent;
  box-shadow: 0 2px 8px rgba(0,0,0,.06);
  transition: all .2s;
  position: relative;
  user-select: none;
}
.phrase-card:hover {
  transform: translateY(-2px);
  box-shadow: 0 8px 24px rgba(90,103,216,.18);
  border-color: #c4b5fd;
}
.phrase-card:active { transform: scale(.98); }
.phrase-card.speaking {
  border-color: #68d391;
  background: linear-gradient(135deg, #f0fff4, #fff);
  box-shadow: 0 4px 20px rgba(72,187,120,.25);
}

.phrase-en {
  font-size: 16px;
  font-weight: 600;
  color: #2d3748;
  line-height: 1.5;
  margin-bottom: 8px;
  padding-right: 28px;
}
.phrase-zh {
  font-size: 13px;
  color: #718096;
  line-height: 1.6;
  min-height: 20px;
}
.phrase-zh.loading { color: #cbd5e0; font-style: italic; }
.phrase-zh.error { color: #fc8181; font-size: 12px; }
.phrase-zh.done { color: #4a5568; }

.speak-icon {
  position: absolute;
  top: 14px;
  right: 14px;
  font-size: 16px;
  opacity: .35;
  transition: opacity .2s, transform .2s;
  pointer-events: none;
}
.phrase-card:hover .speak-icon { opacity: .7; }
.phrase-card.speaking .speak-icon { opacity: 1; transform: scale(1.2); }

.phrase-note {
  font-size: 11px;
  color: #a0aec0;
  margin-top: 6px;
  font-style: italic;
}

/* ── NO RESULTS ── */
.no-results {
  text-align: center;
  padding: 60px 20px;
  color: #a0aec0;
  font-size: 15px;
}

/* ── HIDDEN ── */
.hidden { display: none !important; }

/* ── SCROLLBAR ── */
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: #cbd5e0; border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: #a0aec0; }

/* ── TRANSLATION PROGRESS ── */
.trans-progress {
  position: fixed;
  bottom: 20px;
  right: 20px;
  background: #2d3748;
  color: white;
  padding: 10px 18px;
  border-radius: 24px;
  font-size: 13px;
  box-shadow: 0 4px 16px rgba(0,0,0,.2);
  z-index: 200;
  opacity: 0;
  transform: translateY(8px);
  transition: all .3s;
  pointer-events: none;
}
.trans-progress.visible { opacity: 1; transform: translateY(0); }

@media (max-width: 640px) {
  .sidebar { width: 200px; }
  .phrase-grid { grid-template-columns: 1fr; }
}
</style>
</head>
<body>

<!-- Header -->
<div class="header">
  <div>
    <div class="header-title">📚 英语短语练习</div>
    <div class="header-subtitle">点击卡片朗读 · 自动加载中文翻译 · 自动读取同目录 phrases.json</div>
  </div>
  <input type="text" class="search-box" id="searchBox" placeholder="🔍 搜索短语…" oninput="onSearch(this.value)">
  <button class="header-btn" onclick="document.getElementById('fileInput').click()">📂 加载文件</button>
  <button class="header-btn" id="autoTransBtn" onclick="toggleAutoTrans()">🌐 自动翻译</button>
  <div class="header-stats" id="headerStats"></div>
  <input type="file" id="fileInput" accept=".json" onchange="loadFile(this)">
</div>

<!-- Layout -->
<div class="layout">
  <!-- Sidebar -->
  <div class="sidebar" id="sidebar">
    <div class="sidebar-header">分类导航</div>
    <div class="sidebar-list" id="sidebarList">
      <div style="color:#a0aec0;font-size:13px;padding:12px">请先加载文件</div>
    </div>
  </div>

  <!-- Main -->
  <div class="main" id="mainContent">
    <div class="welcome" id="welcomeScreen">
      <div class="welcome-icon">🎯</div>
      <h2>英语短语学习</h2>
      <p id="welcomeMsg">正在自动读取 <code>phrases.json</code>…</p>
      <button class="welcome-btn hidden" id="manualLoadBtn" onclick="document.getElementById('fileInput').click()">📂 手动选择 phrases.json</button>
    </div>
  </div>
</div>

<!-- Translation Progress Toast -->
<div class="trans-progress" id="transProgress">🌐 翻译中…</div>

<script>
// ── State ──────────────────────────────────────────────
let phraseData = null;
let autoTranslate = true;
let currentSpeaking = null;
let searchQuery = '';
let allCards = [];   // {el, text, zhEl}

// Translation queue
const transQueue = [];
const transCache = {};
let transProcessing = false;
let pendingCount = 0;
const TRANS_DELAY = 120; // ms between requests

// ── LocalStorage helpers ───────────────────────────────
function lsKey(text) {
  // Simple hash to keep key short
  let h = 0;
  for (let i = 0; i < text.length; i++) h = (Math.imul(31, h) + text.charCodeAt(i)) | 0;
  return 'ph_' + (h >>> 0).toString(36);
}

function loadCached(text) {
  const k = lsKey(text);
  if (transCache[k]) return transCache[k];
  const v = localStorage.getItem(k);
  if (v) transCache[k] = v;
  return v || null;
}

function saveCache(text, zh) {
  const k = lsKey(text);
  transCache[k] = zh;
  try { localStorage.setItem(k, zh); } catch(e) {}
}

// ── Translation API ────────────────────────────────────
async function fetchTranslation(text) {
  const url = 'https://translate.googleapis.com/translate_a/single?client=gtx&sl=en&tl=zh-CN&dt=t&q=' + encodeURIComponent(text);
  const res = await fetch(url, { signal: AbortSignal.timeout(8000) });
  if (!res.ok) throw new Error('HTTP ' + res.status);
  const json = await res.json();
  return (json[0] || []).map(x => x ? x[0] : '').join('');
}

function queueTranslation(text, zhEl) {
  const cached = loadCached(text);
  if (cached) {
    setZh(zhEl, cached);
    return;
  }
  pendingCount++;
  transQueue.push({ text, zhEl });
  if (!transProcessing) processTransQueue();
  updateProgressToast();
}

async function processTransQueue() {
  if (transQueue.length === 0) {
    transProcessing = false;
    updateProgressToast();
    return;
  }
  transProcessing = true;

  const { text, zhEl } = transQueue.shift();

  // Check again (might have been cached while waiting)
  const cached = loadCached(text);
  if (cached) {
    setZh(zhEl, cached);
    pendingCount = Math.max(0, pendingCount - 1);
    updateProgressToast();
    setTimeout(processTransQueue, 30);
    return;
  }

  try {
    const zh = await fetchTranslation(text);
    saveCache(text, zh);
    setZh(zhEl, zh);
  } catch(e) {
    zhEl.textContent = '翻译失败，点此重试';
    zhEl.className = 'phrase-zh error';
    zhEl.onclick = (ev) => { ev.stopPropagation(); zhEl.className = 'phrase-zh loading'; zhEl.textContent = '翻译中…'; zhEl.onclick = null; queueTranslation(text, zhEl); };
  }

  pendingCount = Math.max(0, pendingCount - 1);
  updateProgressToast();
  setTimeout(processTransQueue, TRANS_DELAY);
}

function setZh(el, text) {
  el.textContent = text || '';
  el.className = 'phrase-zh done';
}

function updateProgressToast() {
  const toast = document.getElementById('transProgress');
  if (pendingCount > 0) {
    toast.textContent = `🌐 翻译中… 剩余 ${pendingCount} 条`;
    toast.classList.add('visible');
  } else {
    toast.classList.remove('visible');
  }
}

// ── Auto-load same-directory phrases.json ───────────────
async function autoLoadJson() {
  try {
    const res = await fetch('./phrases.json', { cache: 'no-cache' });
    if (!res.ok) throw new Error('HTTP ' + res.status);
    phraseData = await res.json();
    renderPage();
  } catch(e) {
    // fetch blocked (file:// protocol) or file not found — show manual option
    document.getElementById('welcomeMsg').innerHTML =
      '未能自动读取 <code>phrases.json</code>（浏览器安全限制或文件不存在）。<br>请手动选择文件，或用本地服务器打开此页面。';
    document.getElementById('manualLoadBtn').classList.remove('hidden');
  }
}

// ── File Loading ───────────────────────────────────────
function loadFile(input) {
  const file = input.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = (e) => {
    try {
      phraseData = JSON.parse(e.target.result);
      renderPage();
    } catch(err) {
      alert('文件格式错误，请确认是正确的 phrases.json');
    }
  };
  reader.readAsText(file, 'UTF-8');
  input.value = '';
}

// ── TTS (Text-to-Speech) ───────────────────────────────
function speak(text, cardEl) {
  // Clean up ellipsis for speaking
  const spoken = text.replace(/…/g, '').replace(/\.\.\./g, '').trim();

  if (currentSpeaking && currentSpeaking !== cardEl) {
    currentSpeaking.classList.remove('speaking');
  }

  window.speechSynthesis.cancel();

  const utt = new SpeechSynthesisUtterance(spoken);
  utt.lang = 'en-US';
  utt.rate = 0.88;
  utt.pitch = 1.05;

  // Try to find an English voice
  const voices = window.speechSynthesis.getVoices();
  const enVoice = voices.find(v => v.lang.startsWith('en-US') && v.localService)
    || voices.find(v => v.lang.startsWith('en'));
  if (enVoice) utt.voice = enVoice;

  cardEl.classList.add('speaking');
  currentSpeaking = cardEl;

  utt.onend = () => {
    cardEl.classList.remove('speaking');
    if (currentSpeaking === cardEl) currentSpeaking = null;
  };
  utt.onerror = () => {
    cardEl.classList.remove('speaking');
    if (currentSpeaking === cardEl) currentSpeaking = null;
  };

  speechSynthesis.speak(utt);
}

// ── Search ─────────────────────────────────────────────
function onSearch(q) {
  searchQuery = q.toLowerCase().trim();
  filterCards();
}

function filterCards() {
  let visibleCount = 0;
  const blocks = document.querySelectorAll('.phrase-block-wrapper');
  blocks.forEach(b => {
    const cards = b.querySelectorAll('.phrase-card');
    let blockVisible = 0;
    cards.forEach(c => {
      const en = (c.dataset.en || '').toLowerCase();
      const zh = (c.querySelector('.phrase-zh') || {}).textContent || '';
      const match = !searchQuery || en.includes(searchQuery) || zh.toLowerCase().includes(searchQuery);
      c.style.display = match ? '' : 'none';
      if (match) blockVisible++;
    });
    b.style.display = blockVisible > 0 ? '' : 'none';
    visibleCount += blockVisible;
  });

  // Update source sections visibility
  document.querySelectorAll('.source-block').forEach(s => {
    const anyVisible = [...s.querySelectorAll('.phrase-block-wrapper')].some(b => b.style.display !== 'none');
    s.style.display = anyVisible ? '' : 'none';
  });
}

// ── Toggle auto translate ──────────────────────────────
function toggleAutoTrans() {
  autoTranslate = !autoTranslate;
  const btn = document.getElementById('autoTransBtn');
  btn.classList.toggle('active', autoTranslate);
  btn.textContent = autoTranslate ? '🌐 自动翻译' : '🌐 翻译关闭';

  if (autoTranslate) {
    // Queue visible items
    observer.disconnect();
    allCards.forEach(({ el, text, zhEl }) => {
      const cached = loadCached(text);
      if (cached) { setZh(zhEl, cached); }
      else if (zhEl.classList.contains('loading')) {
        observer.observe(el);
      }
    });
  }
}

// ── Intersection Observer for lazy translation ─────────
let observer;

function setupObserver() {
  observer = new IntersectionObserver((entries) => {
    entries.forEach(entry => {
      if (!entry.isIntersecting || !autoTranslate) return;
      const card = entry.target;
      const zhEl = card.querySelector('.phrase-zh');
      if (!zhEl || !zhEl.classList.contains('loading')) {
        observer.unobserve(card);
        return;
      }
      const text = card.dataset.en;
      queueTranslation(text, zhEl);
      observer.unobserve(card);
    });
  }, { rootMargin: '200px' });
}

// ── Sidebar Navigation ─────────────────────────────────
function renderSidebar(sources) {
  const list = document.getElementById('sidebarList');
  list.innerHTML = '';

  sources.forEach(src => {
    const item = document.createElement('div');
    item.className = 'source-nav-item';
    item.innerHTML = `<span>${src.title}</span><span class="source-nav-count">${src.itemCount}</span>`;
    item.onclick = () => {
      document.querySelectorAll('.source-nav-item').forEach(i => i.classList.remove('active'));
      item.classList.add('active');
      const target = document.getElementById('source-' + src.id);
      if (target) target.scrollIntoView({ behavior: 'smooth', block: 'start' });
    };
    list.appendChild(item);
  });
}

// ── Main Content Rendering ─────────────────────────────
function renderPage() {
  if (!phraseData) return;

  setupObserver();
  allCards = [];

  document.getElementById('welcomeScreen').classList.add('hidden');

  const main = document.getElementById('mainContent');
  // Remove old content except welcome screen
  [...main.children].forEach(c => {
    if (!c.classList.contains('welcome')) main.removeChild(c);
  });

  const { sources, itemCount } = phraseData;
  document.getElementById('headerStats').textContent = `共 ${itemCount.toLocaleString()} 条短语`;
  document.getElementById('autoTransBtn').classList.add('active');

  renderSidebar(sources);

  const fragment = document.createDocumentFragment();

  sources.forEach(src => {
    const srcBlock = document.createElement('div');
    srcBlock.className = 'source-block';
    srcBlock.id = 'source-' + src.id;

    srcBlock.innerHTML = `
      <div class="source-title">${escHtml(src.title)}</div>
      <div class="source-meta">${src.sections.length} 个小节 · ${src.itemCount} 条短语</div>
    `;

    src.sections.forEach(sec => {
      const secBlock = document.createElement('div');
      secBlock.className = 'section-block';

      const heading = document.createElement('div');
      heading.className = 'section-title';
      heading.textContent = sec.title || sec.heading || '';
      secBlock.appendChild(heading);

      const grid = document.createElement('div');
      grid.className = 'phrase-grid';

      const wrapper = document.createElement('div');
      wrapper.className = 'phrase-block-wrapper';

      sec.items.forEach(item => {
        const text = item.speakText || item.text || '';
        if (!text.trim()) return;

        const card = document.createElement('div');
        card.className = 'phrase-card';
        card.dataset.en = text;

        const cached = loadCached(text);

        card.innerHTML = `
          <span class="speak-icon">🔊</span>
          <div class="phrase-en">${escHtml(text)}</div>
          <div class="phrase-zh ${cached ? 'done' : 'loading'}">${cached ? escHtml(cached) : '翻译中…'}</div>
          ${item.note ? `<div class="phrase-note">${escHtml(item.note)}</div>` : ''}
        `;

        const zhEl = card.querySelector('.phrase-zh');

        card.onclick = () => speak(text, card);

        allCards.push({ el: card, text, zhEl });

        if (!cached) {
          observer.observe(card);
        }

        grid.appendChild(card);
      });

      wrapper.appendChild(grid);
      secBlock.appendChild(wrapper);
      srcBlock.appendChild(secBlock);
    });

    fragment.appendChild(srcBlock);
  });

  main.appendChild(fragment);
}

function escHtml(str) {
  return String(str)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;');
}

// ── Keyboard shortcuts ─────────────────────────────────
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') {
    window.speechSynthesis.cancel();
    if (currentSpeaking) { currentSpeaking.classList.remove('speaking'); currentSpeaking = null; }
  }
  if ((e.ctrlKey || e.metaKey) && e.key === 'f') {
    e.preventDefault();
    document.getElementById('searchBox').focus();
  }
});

// Pre-load voices
window.speechSynthesis.getVoices();
window.speechSynthesis.onvoiceschanged = () => window.speechSynthesis.getVoices();

setupObserver();
autoLoadJson();
</script>
</body>
</html>
